<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Map - Austin Workout Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
    <link
      rel="icon"
      type="image/png"
      href="./assets/circle-greek-frame-round-meander-border-decoration-elements-pattern-png.png"
    />
    <link
      rel="apple-touch-icon"
      href="./assets/circle-greek-frame-round-meander-border-decoration-elements-pattern-png.png"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="map" aria-label="Map of Austin workout areas"></div>
    <div class="brand-mark" aria-hidden="true"></div>

    <nav id="category-nav" class="floating-rail rail-nav" aria-label="Workout category filters">
      <button class="rail-link is-active" type="button" data-category="all">all</button>
      <button class="rail-link" type="button" data-category="calisthenics">calisthenics</button>
      <!-- <button class="rail-link" type="button" data-category="track">tracks</button> -->
      <button class="rail-link" type="button" data-category="trail">trails</button>
      <button class="rail-link" type="button" data-category="hill">hills</button>
    </nav>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="./app-config.js"></script>
    <script src="./config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
