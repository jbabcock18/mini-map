<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Map - Austin Workout Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
    <link
      rel="icon"
      type="image/png"
      href="./assets/circle-greek-frame-round-meander-border-decoration-elements-pattern-png.png"
    />
    <link
      rel="apple-touch-icon"
      href="./assets/circle-greek-frame-round-meander-border-decoration-elements-pattern-png.png"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="map" aria-label="Map of Austin workout areas"></div>
    <div class="brand-mark" aria-hidden="true"></div>
    <button id="notes-toggle" class="notes-toggle" type="button" aria-expanded="false">
      notes
    </button>

    <nav id="category-nav" class="floating-rail rail-nav" aria-label="Map filters"></nav>
    <aside class="map-legend" aria-label="Fitness legend">
      <p class="legend-title">fitness legend</p>
      <div class="legend-item">
        <img
          class="legend-icon"
          src="./assets/marker_blue-removebg-preview.png"
          alt=""
          aria-hidden="true"
        />
        <span>calisthenics</span>
      </div>
      <div class="legend-item">
        <span class="legend-line legend-line-trail" aria-hidden="true"></span>
        <span>trails</span>
      </div>
      <div class="legend-item">
        <span class="legend-line legend-line-track" aria-hidden="true"></span>
        <span>tracks</span>
      </div>
      <div class="legend-item">
        <img
          class="legend-icon"
          src="./assets/marker_yellow-removebg-preview.png"
          alt=""
          aria-hidden="true"
        />
        <span>hills</span>
      </div>
    </aside>
    <aside id="notes-panel" class="notes-panel hidden" aria-label="Location notes">
      <div class="notes-panel-header">
        <div>
          <p class="notes-eyebrow">field notes</p>
          <h2 class="notes-title">Austin training spots</h2>
        </div>
      </div>
      <div id="notes-filters" class="notes-filters" aria-label="Notes category filters"></div>
      <div id="notes-list" class="notes-list"></div>
    </aside>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="./app-config.js"></script>
    <script src="./config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
